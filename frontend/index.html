<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon / Logo Tab -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://readyroom.id/" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#dc2626" />
    <meta name="msapplication-TileColor" content="#dc2626" />

    <!-- Primary SEO -->
    <title>ReadyRoom | Booking Hotel Transit & Full Day Lebih Mudah</title>

    <meta
      name="description"
      content="ReadyRoom adalah platform booking hotel transit dan full day yang membantu tamu menemukan kamar dengan cepat, mudah, dan nyaman di berbagai lokasi pilihan."
    />

    <meta
      name="keywords"
      content="ReadyRoom, booking hotel, hotel transit, hotel full day, booking kamar, hotel harian, hotel Indonesia, reservasi hotel"
    />

    <meta name="author" content="ReadyRoom" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Indonesian" />
    <meta name="geo.region" content="ID" />
    <meta name="geo.placename" content="Indonesia" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:site_name" content="ReadyRoom" />
    <meta property="og:title" content="ReadyRoom - Booking Hotel Transit & Full Day" />
    <meta
      property="og:description"
      content="Temukan kamar hotel untuk transit dan full day dengan proses booking yang lebih mudah, cepat, dan nyaman bersama ReadyRoom."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://readyroom.id/" />
    <meta property="og:image" content="https://readyroom.id/logo.png" />
    <meta property="og:image:alt" content="Logo ReadyRoom" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReadyRoom - Booking Hotel Transit & Full Day" />
    <meta
      name="twitter:description"
      content="Booking hotel transit dan full day jadi lebih mudah bersama ReadyRoom."
    />
    <meta name="twitter:image" content="https://readyroom.id/logo.png" />

    <!-- Structured Data: Organization + Website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://readyroom.id/#organization",
            "name": "ReadyRoom",
            "url": "https://readyroom.id/",
            "logo": "https://readyroom.id/logo.png",
            "description": "ReadyRoom adalah platform booking hotel transit dan full day untuk membantu tamu menemukan kamar dengan cepat, mudah, dan nyaman.",
            "sameAs": []
          },
          {
            "@type": "WebSite",
            "@id": "https://readyroom.id/#website",
            "url": "https://readyroom.id/",
            "name": "ReadyRoom",
            "description": "Booking hotel transit dan full day lebih mudah bersama ReadyRoom.",
            "publisher": {
              "@id": "https://readyroom.id/#organization"
            },
            "inLanguage": "id-ID"
          }
        ]
      }
    </script>
  </head>

  <body>
    <noscript>
      ReadyRoom membutuhkan JavaScript untuk menampilkan fitur booking hotel transit dan full day.
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
